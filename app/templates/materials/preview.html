{% extends "base.html" %}

{% block title %}预览 - 小课大{% endblock %}

{% block content %}
<div class="container-fluid">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('materials.detail', id=material.id) }}">{{ material.title }}</a></li>
            <li class="breadcrumb-item active">预览</li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-body text-center">
            {% if material.file_type == 'image' %}
            <img src="/static/{{ material.file_path }}" class="img-fluid" alt="{{ material.title }}">
            {% elif material.file_type == 'pdf' %}
            <iframe src="/static/{{ material.file_path }}" style="width: 100%; height: 80vh;" frameborder="0"></iframe>
            {% else %}
            <p class="text-muted">不支持预览此文件类型</p>
            <a href="/static/{{ material.file_path }}" class="btn btn-primary">下载文件</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
