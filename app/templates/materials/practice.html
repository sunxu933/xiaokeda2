{% extends "base.html" %}

{% block title %}知识库练习 - 小课大{% endblock %}

{% block content %}
<div class="container-fluid">
    <h4 class="mb-4">知识库练习</h4>

    <div class="row">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0">选择章节</h6>
                </div>
                <div class="card-body">
                    <div id="chapterList">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">练习题</h6>
                    <button id="generateBtn" class="btn btn-primary btn-sm" disabled>
                        <i class="bi bi-magic"></i> 生成练习
                    </button>
                </div>
                <div class="card-body" id="practiceContent">
                    <p class="text-muted text-center">请从左侧选择章节开始练习</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let selectedChapter = null;
let selectedSubject = null;

async function loadChapters() {
    const res = await fetch('{{ url_for("materials.knowledge_base_search") }}?q=');
    const data = await res.json();
    // Simplified display
    let html = '';
    for (const item of data.results || []) {
        html += `<div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="chapter" value="${item.id}" data-topic="${item.topic}" data-subject="${item.subject}" id="ch${item.id}">
            <label class="form-check-label" for="ch${item.id}">
                <span class="badge" style="background-color: ${item.subject === '语文' ? '#e74c3c' : item.subject === '数学' ? '#3498db' : '#2ecc71'}; color: white;">${item.subject}</span>
                ${item.chapter} · ${item.topic}
            </label>
        </div>`;
    }
    document.getElementById('chapterList').innerHTML = html || '<p class="text-muted">暂无数据</p>';

    document.querySelectorAll('input[name="chapter"]').forEach(radio => {
        radio.addEventListener('change', function() {
            selectedChapter = this.dataset.topic;
            selectedSubject = this.dataset.subject;
            document.getElementById('generateBtn').disabled = false;
        });
    });
}

document.getElementById('generateBtn').addEventListener('click', async function() {
    if (!selectedChapter) return;

    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 生成中...';

    const res = await fetch('{{ url_for("materials.generate_questions") }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            knowledge_points: [selectedChapter],
            subject: selectedSubject,
            count: 5
        })
    });
    const data = await res.json();

    if (data.success && data.questions) {
        let html = '';
        data.questions.forEach((q, i) => {
            html += `<div class="mb-4 p-3 border rounded">
                <h6>题目 ${i + 1}</h6>
                <p>${q.question || q.question_text}</p>
                <details>
                    <summary class="text-primary">查看答案</summary>
                    <div class="mt-2 p-2 bg-light">
                        <strong>答案：</strong>${q.answer}
                    </div>
                </details>
            </div>`;
        });
        document.getElementById('practiceContent').innerHTML = html;
    } else {
        document.getElementById('practiceContent').innerHTML = '<p class="text-danger">生成失败，请重试</p>';
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-magic"></i> 重新生成';
});

loadChapters();
</script>
{% endblock %}
