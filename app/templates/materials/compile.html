{% extends "base.html" %}

{% block title %}题型汇编 - 小课大{% endblock %}

{% block content %}
<div class="container-fluid">
    <h4 class="mb-4">题型汇编</h4>

    <div class="card">
        <div class="card-header">
            <h6 class="mb-0">步骤1：选择资料</h6>
        </div>
        <div class="card-body">
            <div class="row">
                {% for m in materials %}
                <div class="col-md-3 mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="materials" value="{{ m.id }}" id="m{{ m.id }}">
                        <label class="form-check-label" for="m{{ m.id }}">
                            {{ m.title }}
                            <small class="text-muted">({{ m.questions|length }}题)</small>
                        </label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">
            <h6 class="mb-0">步骤2：选择题型</h6>
        </div>
        <div class="card-body">
            <div class="row" id="typeOptions">
                <p class="text-muted">请先选择资料</p>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">
            <h6 class="mb-0">步骤3：生成PDF</h6>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">PDF标题</label>
                <input type="text" id="pdfTitle" class="form-control" value="专项练习" placeholder="输入PDF标题">
            </div>
            <button id="generateBtn" class="btn btn-primary" disabled>
                <i class="bi bi-file-pdf"></i> 生成PDF
            </button>
        </div>
    </div>

    <div id="resultArea" class="mt-3" style="display: none;">
        <div class="alert alert-success">
            <i class="bi bi-check-circle"></i> PDF已生成！
            <a id="downloadLink" href="#" class="alert-link" target="_blank">点击下载</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const selectedMaterials = new Set();
const selectedTypes = new Set();

document.querySelectorAll('input[name="materials"]').forEach(cb => {
    cb.addEventListener('change', async function() {
        if (this.checked) {
            selectedMaterials.add(this.value);
        } else {
            selectedMaterials.delete(this.value);
        }
        await loadTypes();
    });
});

async function loadTypes() {
    if (selectedMaterials.size === 0) {
        document.getElementById('typeOptions').innerHTML = '<p class="text-muted">请先选择资料</p>';
        document.getElementById('generateBtn').disabled = true;
        return;
    }

    const res = await fetch('{{ url_for("materials.compile_types") }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ material_ids: Array.from(selectedMaterials) })
    });
    const data = await res.json();

    let html = '';
    for (const type of data.types || []) {
        html += `<div class="col-md-3 mb-2">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="qtype" value="${type}" id="t${type}">
                <label class="form-check-label" for="t${type}">${type}</label>
            </div>
        </div>`;
    }
    document.getElementById('typeOptions').innerHTML = html || '<p class="text-muted">无可用题型</p>';

    document.querySelectorAll('input[name="qtype"]').forEach(cb => {
        cb.addEventListener('change', function() {
            if (this.checked) {
                selectedTypes.add(this.value);
            } else {
                selectedTypes.delete(this.value);
            }
            document.getElementById('generateBtn').disabled = selectedTypes.size === 0;
        });
    });
}

document.getElementById('generateBtn').addEventListener('click', async function() {
    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 生成中...';

    const res = await fetch('{{ url_for("materials.compile_generate") }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            material_ids: Array.from(selectedMaterials),
            question_types: Array.from(selectedTypes),
            title: document.getElementById('pdfTitle').value
        })
    });
    const data = await res.json();

    if (data.success) {
        document.getElementById('downloadLink').href = '{{ url_for("materials.compile_preview", filename="") }}' + data.filepath.split('/').pop();
        document.getElementById('resultArea').style.display = 'block';
    } else {
        alert('生成失败: ' + data.error);
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-file-pdf"></i> 生成PDF';
});
</script>
{% endblock %}
