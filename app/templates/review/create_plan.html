{% extends "base.html" %}

{% block title %}创建复习计划 - 小课大{% endblock %}

{% block content %}
<div class="container-fluid">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('review.list') }}">复习计划</a></li>
            <li class="breadcrumb-item active">创建计划</li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">创建复习计划</h5>
        </div>
        <div class="card-body">
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">计划名称</label>
                    <input type="text" name="title" class="form-control" placeholder="如：期中考试复习" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">科目（可选）</label>
                        <select name="subject" class="form-select">
                            <option value="">全科</option>
                            <option value="语文">语文</option>
                            <option value="数学">数学</option>
                            <option value="英语">英语</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">目标考试日期</label>
                        <input type="date" name="exam_date" class="form-control" required>
                    </div>
                </div>
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i>
                    系统将根据您最近的错题记录自动生成复习计划，包括每日任务和模拟测试。
                </div>
                <button type="submit" class="btn btn-primary">创建计划</button>
                <a href="{{ url_for('review.list') }}" class="btn btn-secondary">取消</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
