{% extends "base.html" %}

{% block title %}数据导出 - 小课大{% endblock %}

{% block content %}
<div class="container-fluid">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('settings.index') }}">系统设置</a></li>
            <li class="breadcrumb-item active">数据导出</li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">导出数据</h5>
        </div>
        <div class="card-body">
            <h6>数据库备份</h6>
            <p class="text-muted">下载完整的SQLite数据库文件，可用于数据迁移或备份。</p>
            <form method="post" action="{{ url_for('settings.export_db') }}">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-download"></i> 下载数据库备份
                </button>
            </form>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-header">
            <h6 class="mb-0">注意事项</h6>
        </div>
        <div class="card-body">
            <ul class="mb-0">
                <li>数据库文件包含所有学生信息、作业记录、错题本等数据</li>
                <li>备份文件为 SQLite 数据库格式（.db）</li>
                <li>建议定期进行数据备份，以防数据丢失</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
